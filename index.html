<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>🏢 OpenClaw Agent Office</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f1a;
            --bg-secondary: #111827;
            --bg-card: #1f2937;
            --bg-desk: #2d3748;
            --accent-primary: #3b82f6;
            --accent-secondary: #8b5cf6;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --border-color: #374151;
            --glow-blue: rgba(59, 130, 246, 0.5);
            --glow-green: rgba(16, 185, 129, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #0f172a 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent-primary);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* Header */
        .header {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            font-size: 2rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
            100% { filter: brightness(1); }
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--accent-success);
            border-radius: 9999px;
            font-size: 0.875rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-success);
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px var(--accent-success);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .refresh-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .refresh-btn.spinning .refresh-icon {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }

        /* Office Floor */
        .office-floor {
            background: linear-gradient(180deg, rgba(31, 41, 55, 0.9) 0%, rgba(17, 24, 39, 0.9) 100%);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .office-floor::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary), var(--accent-primary));
            animation: scanline 3s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .floor-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Agent Desks */
        .desks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 2rem;
            position: relative;
        }

        .agent-desk {
            background: linear-gradient(145deg, var(--bg-desk) 0%, var(--bg-card) 100%);
            border-radius: 1.5rem;
            padding: 2rem;
            border: 2px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .agent-desk::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--status-color, var(--accent-primary));
            box-shadow: 0 0 20px var(--status-color, var(--accent-primary));
        }

        .agent-desk::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255, 255, 255, 0.03) 50%,
                transparent 70%
            );
            animation: shine 6s infinite;
            pointer-events: none;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .agent-desk:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            border-color: var(--status-color, var(--accent-primary));
        }

        .agent-desk.active { --status-color: var(--accent-success); }
        .agent-desk.standby { --status-color: var(--accent-warning); }
        .agent-desk.idle { --status-color: var(--text-secondary); }

        /* Character Area */
        .character-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .character-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 1rem;
        }

        .character-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            background: linear-gradient(145deg, var(--bg-secondary), var(--bg-primary));
            border: 4px solid var(--status-color, var(--border-color));
            box-shadow: 0 0 30px var(--status-glow, rgba(0,0,0,0.3));
            transition: all 0.3s;
            position: relative;
            z-index: 2;
        }

        .agent-desk.active .character-avatar {
            --status-glow: var(--glow-green);
            animation: working 2s infinite;
        }

        .agent-desk.standby .character-avatar {
            animation: standby 3s infinite;
        }

        .agent-desk.idle .character-avatar {
            opacity: 0.7;
        }

        @keyframes working {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes standby {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Typing Indicator */
        .typing-indicator {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            background: var(--bg-secondary);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            z-index: 3;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--status-color, var(--accent-primary));
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        /* Desk Content */
        .desk-content {
            text-align: center;
        }

        .agent-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .agent-role {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid var(--status-color, var(--border-color));
            color: var(--status-color, var(--text-primary));
        }

        /* Monitor */
        .monitor {
            background: linear-gradient(145deg, #0a0f1a, #111827);
            border-radius: 0.75rem;
            padding: 1.25rem;
            margin-top: 1.5rem;
            border: 1px solid var(--border-color);
            font-family: 'JetBrains Mono', monospace;
            position: relative;
            overflow: hidden;
        }

        .monitor::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                180deg,
                rgba(59, 130, 246, 0.1) 0%,
                transparent 50%
            );
            pointer-events: none;
        }

        .monitor-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .monitor-dots {
            display: flex;
            gap: 4px;
            margin-left: auto;
        }

        .monitor-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .monitor-dot:nth-child(1) { background: var(--accent-danger); }
        .monitor-dot:nth-child(2) { background: var(--accent-warning); }
        .monitor-dot:nth-child(3) { background: var(--accent-success); }

        .monitor-content {
            font-size: 0.875rem;
            line-height: 1.6;
        }

        .task-line {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .task-icon {
            color: var(--accent-primary);
        }

        .next-task {
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .clock-icon {
            animation: tick 1s infinite;
        }

        @keyframes tick {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Activity Log */
        .activity-section {
            background: linear-gradient(145deg, rgba(31, 41, 55, 0.9), rgba(17, 24, 39, 0.9));
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 2rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--accent-success);
            border-radius: 9999px;
            font-size: 0.75rem;
            color: var(--accent-success);
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px var(--glow-green); }
            50% { box-shadow: 0 0 20px var(--glow-green); }
        }

        .log-container {
            background: linear-gradient(145deg, #0a0f1a, #111827);
            border-radius: 1rem;
            padding: 1.25rem;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            border: 1px solid var(--border-color);
        }

        .log-entry {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid transparent;
            transition: all 0.2s;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .log-entry:hover {
            background: rgba(255, 255, 255, 0.05);
            border-left-color: var(--accent-primary);
        }

        .log-time {
            color: var(--text-secondary);
            white-space: nowrap;
            font-size: 0.75rem;
            min-width: 50px;
        }

        .log-agent {
            color: var(--accent-primary);
            font-weight: 600;
            min-width: 100px;
        }

        .log-action {
            color: var(--text-primary);
            flex: 1;
        }

        .log-status {
            font-size: 1rem;
        }

        .status-success { color: var(--accent-success); }
        .status-pending { color: var(--accent-warning); }
        .status-error { color: var(--accent-danger); }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: linear-gradient(145deg, rgba(31, 41, 55, 0.9), rgba(17, 24, 39, 0.9));
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-primary);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.2);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Update Timer */
        .update-timer {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: linear-gradient(145deg, rgba(31, 41, 55, 0.95), rgba(17, 24, 39, 0.95));
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 100;
        }

        .timer-icon {
            font-size: 1.5rem;
            animation: tick 1s infinite;
        }

        .timer-text {
            font-size: 0.875rem;
        }

        .timer-countdown {
            font-weight: 700;
            color: var(--accent-primary);
            font-size: 1.125rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .desks-grid {
                grid-template-columns: 1fr;
            }
            
            .header {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }
            
            .container {
                padding: 1rem;
            }

            .character-container {
                width: 100px;
                height: 100px;
            }

            .character-avatar {
                font-size: 3rem;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="bg-grid"></div>
    <div class="particles" id="particles"></div>

    <header class="header">
        <div class="logo">
            <span class="logo-icon">🏢</span>
            <span class="logo-text">OpenClaw Agent Office</span>
        </div>
        <div class="header-info">
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>System Operational</span>
            </div>
            <button class="refresh-btn" onclick="refreshData()">
                <span class="refresh-icon">🔄</span>
                <span>동기화</span>
            </button>
        </div>
    </header>

    <main class="container">
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">활성 에이전트</div>
                <div class="stat-value" id="active-count">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">총 작업 완료</div>
                <div class="stat-value" id="total-tasks">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">마지막 업데이트</div>
                <div class="stat-value" id="last-update" style="font-size: 1rem;">-</div>
            </div>
        </div>

        <!-- Agent Office Floor -->
        <div class="office-floor">
            <h2 class="floor-title">🖥️ Agent Workstations</h2>
            <div class="desks-grid" id="desks-container">
                <!-- Agents will be loaded here -->
            </div>
        </div>

        <!-- Activity Log -->
        <div class="activity-section">
            <div class="section-header">
                <h2 class="section-title">📋 Live Activity Log</h2>
                <div class="live-indicator">
                    <span class="status-dot"></span>
                    <span>LIVE</span>
                </div>
            </div>
            <div class="log-container" id="log-container">
                <!-- Logs will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Update Timer -->
    <div class="update-timer">
        <span class="timer-icon">⏱️</span>
        <div class="timer-text">
            다음 업데이트<br>
            <span class="timer-countdown" id="countdown">60초</span>
        </div>
    </div>

    <script>
        // Configuration
        const UPDATE_INTERVAL = 60000; // 1 minute
        let countdown = 60;
        let countdownInterval;

        // Default agent data with enhanced visual states
        let agentsData = {
            agents: [
                {
                    id: 'career-coach',
                    name: 'Career Coach',
                    role: '취업 코치',
                    avatar: '🦊',
                    status: 'active',
                    currentTask: '리포트 생성 완료',
                    nextTask: '내일 08:00 리포트',
                    isTyping: true,
                    lastActivity: '2026-03-14T08:00:00Z'
                },
                {
                    id: 'stock-manager',
                    name: 'Stock Manager',
                    role: '주식 매니저', 
                    avatar: '📈',
                    status: 'standby',
                    currentTask: 'Uber 분석 완료',
                    nextTask: '내일 08:30 보고서',
                    isTyping: false,
                    lastActivity: '2026-03-14T16:30:00Z'
                },
                {
                    id: 'code-mentor',
                    name: 'Code Mentor',
                    role: '코딩 멘토',
                    avatar: '💻',
                    status: 'idle',
                    currentTask: '대기 중',
                    nextTask: '요청 대기',
                    isTyping: false,
                    lastActivity: null
                }
            ],
            logs: [
                { time: '08:00', agent: 'Career Coach', action: '아침 리포트 발송', status: 'success' },
                { time: '08:30', agent: 'Stock Manager', action: '주식 보고서 발송', status: 'success' },
                { time: '16:16', agent: 'Stock Manager', action: 'Uber 종목 추가', status: 'success' },
                { time: '16:30', agent: 'Stock Manager', action: 'Uber 분석 완료', status: 'success' },
                { time: '23:10', agent: 'System', action: 'Agent Office Dashboard 생성', status: 'success' }
            ]
        };

        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        // Render agent desks with enhanced visuals
        function renderAgents() {
            const container = document.getElementById('desks-container');
            const activeCount = agentsData.agents.filter(a => a.status === 'active').length;
            
            document.getElementById('active-count').textContent = `${activeCount}/${agentsData.agents.length}`;
            document.getElementById('total-tasks').textContent = agentsData.logs.length;
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString('ko-KR');
            
            container.innerHTML = agentsData.agents.map(agent => `
                <div class="agent-desk ${agent.status}">
                    <div class="character-area">
                        <div class="character-container">
                            <div class="character-avatar">
                                ${agent.avatar}
                            </div>
                            ${agent.isTyping && agent.status === 'active' ? `
                                <div class="typing-indicator">
                                    <div class="typing-dot"></div>
                                    <div class="typing-dot"></div>
                                    <div class="typing-dot"></div>
                                </div>
                            ` : ''}
                        </div>
                        <div class="desk-content">
                            <h3 class="agent-name">${agent.name}</h3>
                            <div class="agent-role">${agent.role}</div>
                            <div class="status-pill">
                                <span class="status-indicator"></span>
                                <span>${getStatusText(agent.status)}</span>
                            </div>
                        </div>
                    </div>
                    <div class="monitor">
                        <div class="monitor-header">
                            <span>🖥️ TERMINAL</span>
                            <div class="monitor-dots">
                                <div class="monitor-dot"></div>
                                <div class="monitor-dot"></div>
                                <div class="monitor-dot"></div>
                            </div>
                        </div>
                        <div class="monitor-content">
                            <div class="task-line">
                                <span class="task-icon">⚡</span>
                                <span>${agent.currentTask}</span>
                            </div>
                            <div class="next-task">
                                <span class="clock-icon">⏰</span>
                                <span>${agent.nextTask}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Get status text
        function getStatusText(status) {
            const texts = {
                'active': '작업 중',
                'standby': '대기 중',
                'idle': '휴식 중'
            };
            return texts[status] || status;
        }

        // Render activity logs with animation
        function renderLogs() {
            const container = document.getElementById('log-container');
            
            container.innerHTML = agentsData.logs.slice().reverse().map((log, index) => `
                <div class="log-entry" style="animation-delay: ${index * 0.05}s">
                    <span class="log-time">${log.time}</span>
                    <span class="log-agent">${log.agent}</span>
                    <span class="log-action">${log.action}</span>
                    <span class="log-status status-${log.status}">
                        ${log.status === 'success' ? '✓' : log.status === 'pending' ? '⏳' : '✗'}
                    </span>
                </div>
            `).join('');
        }

        // Refresh data
        async function refreshData() {
            const btn = document.querySelector('.refresh-btn');
            btn.classList.add('spinning');
            
            try {
                const response = await fetch('./agents.json?t=' + Date.now());
                if (response.ok) {
                    const data = await response.json();
                    agentsData = { ...agentsData, ...data };
                }
            } catch (e) {
                console.log('Using default data');
            }
            
            renderAgents();
            renderLogs();
            
            setTimeout(() => {
                btn.classList.remove('spinning');
            }, 1000);
        }

        // Countdown timer
        function startCountdown() {
            countdown = 60;
            clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                countdown--;
                document.getElementById('countdown').textContent = countdown + '초';
                
                if (countdown <= 0) {
                    refreshData();
                    countdown = 60;
                }
            }, 1000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            renderAgents();
            renderLogs();
            startCountdown();
            
            setInterval(refreshData, UPDATE_INTERVAL);
        });
    </script>
</body>
</html>
