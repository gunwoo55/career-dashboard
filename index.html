<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>🏢 OpenClaw Agent Office</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --accent-primary: #3b82f6;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #475569;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            font-size: 2rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--accent-success);
            border-radius: 9999px;
            font-size: 0.875rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .refresh-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--accent-primary);
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .refresh-btn.spinning .refresh-icon {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Office Floor */
        .office-floor {
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .office-floor::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .floor-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Agent Desks */
        .desks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .agent-desk {
            background: var(--bg-card);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 2px solid var(--border-color);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .agent-desk::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--status-color, var(--accent-primary));
        }

        .agent-desk:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .agent-desk.active { --status-color: var(--accent-success); }
        .agent-desk.standby { --status-color: var(--accent-warning); }
        .agent-desk.idle { --status-color: var(--text-secondary); }

        .desk-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .agent-avatar {
            width: 60px;
            height: 60px;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background: var(--bg-secondary);
            border: 2px solid var(--status-color, var(--border-color));
        }

        .agent-info h3 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .agent-role {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .agent-status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem 0.75rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-top: 0.75rem;
        }

        .status-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--status-color);
        }

        .desk-monitor {
            background: var(--bg-primary);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-top: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            border: 1px solid var(--border-color);
        }

        .monitor-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .current-task {
            color: var(--text-primary);
        }

        .next-task {
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* Activity Log */
        .activity-section {
            background: var(--bg-secondary);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .section-title {
            font-size: 1.125rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--accent-success);
        }

        .log-container {
            background: var(--bg-primary);
            border-radius: 0.5rem;
            padding: 1rem;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
        }

        .log-entry {
            display: flex;
            gap: 1rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-time {
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .log-agent {
            color: var(--accent-primary);
            font-weight: 500;
            min-width: 100px;
        }

        .log-action {
            color: var(--text-primary);
        }

        .log-status {
            margin-left: auto;
        }

        .status-success { color: var(--accent-success); }
        .status-pending { color: var(--accent-warning); }
        .status-error { color: var(--accent-danger); }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-secondary);
            border-radius: 0.75rem;
            padding: 1rem;
            border: 1px solid var(--border-color);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* Next Update Timer */
        .update-timer {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .timer-icon {
            font-size: 1.25rem;
        }

        .timer-text {
            font-size: 0.875rem;
        }

        .timer-countdown {
            font-weight: 600;
            color: var(--accent-primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .desks-grid {
                grid-template-columns: 1fr;
            }
            
            .header {
                flex-direction: column;
                gap: 1rem;
            }
            
            .container {
                padding: 1rem;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <span class="logo-icon">🏢</span>
            <span class="logo-text">OpenClaw Agent Office</span>
        </div>
        <div class="header-info">
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>System Operational</span>
            </div>
            <button class="refresh-btn" onclick="refreshData()">
                <span class="refresh-icon">🔄</span>
                <span>새로고침</span>
            </button>
        </div>
    </header>

    <main class="container">
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">활성 에이전트</div>
                <div class="stat-value" id="active-count">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">총 작업 완료</div>
                <div class="stat-value" id="total-tasks">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">마지막 업데이트</div>
                <div class="stat-value" id="last-update" style="font-size: 1rem;">-</div>
            </div>
        </div>

        <!-- Agent Office Floor -->
        <div class="office-floor">
            <h2 class="floor-title">🖥️ Agent Workstations</h2>
            <div class="desks-grid" id="desks-container">
                <!-- Agents will be loaded here -->
            </div>
        </div>

        <!-- Activity Log -->
        <div class="activity-section">
            <div class="section-header">
                <h2 class="section-title">📋 Live Activity Log</h2>
                <div class="live-indicator">
                    <span class="status-dot"></span>
                    <span>LIVE</span>
                </div>
            </div>
            <div class="log-container" id="log-container">
                <!-- Logs will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Update Timer -->
    <div class="update-timer">
        <span class="timer-icon">⏱️</span>
        <div class="timer-text">
            다음 업데이트: <span class="timer-countdown" id="countdown">60초</span>
        </div>
    </div>

    <script>
        // Configuration
        const UPDATE_INTERVAL = 60000; // 1 minute
        let countdown = 60;
        let countdownInterval;

        // Agent data (will be loaded from agents.json)
        let agentsData = {
            agents: [
                {
                    id: 'career-coach',
                    name: 'Career Coach',
                    role: '취업 코치',
                    avatar: '🦊',
                    status: 'active',
                    currentTask: '리포트 생성 완료',
                    nextTask: '내일 08:00 리포트',
                    lastActivity: '2026-03-14T08:00:00Z'
                },
                {
                    id: 'stock-manager',
                    name: 'Stock Manager',
                    role: '주식 매니저', 
                    avatar: '📈',
                    status: 'standby',
                    currentTask: 'Uber 분석 완료',
                    nextTask: '내일 08:30 보고서',
                    lastActivity: '2026-03-14T16:30:00Z'
                },
                {
                    id: 'code-mentor',
                    name: 'Code Mentor',
                    role: '코딩 멘토',
                    avatar: '💻',
                    status: 'idle',
                    currentTask: '대기 중',
                    nextTask: '요청 대기',
                    lastActivity: null
                }
            ],
            logs: [
                { time: '08:00', agent: 'Career Coach', action: '아침 리포트 발송', status: 'success' },
                { time: '08:30', agent: 'Stock Manager', action: '주식 보고서 발송', status: 'success' },
                { time: '16:16', agent: 'Stock Manager', action: 'Uber 종목 추가', status: 'success' },
                { time: '16:30', agent: 'Stock Manager', action: 'Uber 분석 완료', status: 'success' },
                { time: '23:10', agent: 'System', action: 'Agent Office Dashboard 생성', status: 'success' }
            ]
        };

        // Render agent desks
        function renderAgents() {
            const container = document.getElementById('desks-container');
            const activeCount = agentsData.agents.filter(a => a.status === 'active').length;
            
            document.getElementById('active-count').textContent = `${activeCount}/${agentsData.agents.length}`;
            document.getElementById('total-tasks').textContent = agentsData.logs.length;
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString('ko-KR');
            
            container.innerHTML = agentsData.agents.map(agent => `
                <div class="agent-desk ${agent.status}">
                    <div class="desk-header">
                        <div class="agent-avatar">${agent.avatar}</div>
                        <div class="agent-info">
                            <h3>${agent.name}</h3>
                            <div class="agent-role">${agent.role}</div>
                            <div class="agent-status">
                                <span class="status-indicator"></span>
                                <span>${getStatusText(agent.status)}</span>
                            </div>
                        </div>
                    </div>
                    <div class="desk-monitor">
                        <div class="monitor-label">Current Task</div>
                        <div class="current-task">${agent.currentTask}</div>
                        <div class="next-task">⏰ ${agent.nextTask}</div>
                    </div>
                </div>
            `).join('');
        }

        // Get status text
        function getStatusText(status) {
            const texts = {
                'active': '🟢 작업 중',
                'standby': '⚪ 대기 중',
                'idle': '🔴 휴식 중'
            };
            return texts[status] || status;
        }

        // Render activity logs
        function renderLogs() {
            const container = document.getElementById('log-container');
            
            container.innerHTML = agentsData.logs.slice().reverse().map(log => `
                <div class="log-entry">
                    <span class="log-time">${log.time}</span>
                    <span class="log-agent">${log.agent}</span>
                    <span class="log-action">${log.action}</span>
                    <span class="log-status status-${log.status}">
                        ${log.status === 'success' ? '✓' : log.status === 'pending' ? '⏳' : '✗'}
                    </span>
                </div>
            `).join('');
        }

        // Refresh data
        async function refreshData() {
            const btn = document.querySelector('.refresh-btn');
            btn.classList.add('spinning');
            
            try {
                // Try to load from agents.json
                const response = await fetch('./agents.json?t=' + Date.now());
                if (response.ok) {
                    const data = await response.json();
                    agentsData = { ...agentsData, ...data };
                }
            } catch (e) {
                console.log('Using default data');
            }
            
            renderAgents();
            renderLogs();
            
            setTimeout(() => {
                btn.classList.remove('spinning');
            }, 1000);
        }

        // Countdown timer
        function startCountdown() {
            countdown = 60;
            clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                countdown--;
                document.getElementById('countdown').textContent = `${countdown}초`;
                
                if (countdown <= 0) {
                    refreshData();
                    countdown = 60;
                }
            }, 1000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderAgents();
            renderLogs();
            startCountdown();
            
            // Auto refresh every minute
            setInterval(refreshData, UPDATE_INTERVAL);
        });
    </script>
</body>
</html>
